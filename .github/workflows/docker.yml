name: Docker Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f src/csharp/Dockerfile \
            -t microhash:ci \
            .
