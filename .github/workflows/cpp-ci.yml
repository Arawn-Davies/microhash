name: C++ CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build C++ tests
        run: |
          g++ -std=c++17 -I src/cpp \
              -o /tmp/microhash_tests \
              tests/cpp/microhash_tests.cpp

      - name: Run C++ tests
        run: /tmp/microhash_tests
