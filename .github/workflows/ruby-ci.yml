name: Ruby CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"

      - name: Install RSpec
        run: gem install rspec --no-document

      - name: Run RSpec suite
        run: rspec tests/ruby/microhash_spec.rb

      - name: Run CLI test vectors
        run: ruby src/ruby/main.rb --test
