name: Ruby CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"

      - name: Install RSpec
        run: gem install rspec --no-document

      - name: Run RSpec suites (pure Ruby)
        run: rspec tests/ruby/microhash_spec.rb tests/microhash-ng/ruby/microhash_ng_spec.rb --format documentation

      - name: Build native extension
        run: |
          cd src/ruby/ext/microhash
          ruby extconf.rb
          make V=1

      - name: Build native extension (microhash-ng)
        run: |
          cd src/microhash-ng/ruby/ext/microhash_ng
          ruby extconf.rb
          make V=1

      - name: Run RSpec suites (native extensions)
        run: rspec tests/ruby/microhash_spec.rb tests/microhash-ng/ruby/microhash_ng_spec.rb --format documentation

      - name: Run CLI test vectors
        run: |
          ruby src/ruby/main.rb --test
          ruby src/microhash-ng/ruby/main.rb --test
